<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"><meta http-equiv="pragma" content="no-cache"><meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>THREAD RIPPER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{background:#0a0a0a;overflow:hidden;height:100%;width:100%;touch-action:none;font-family:'Press Start 2P',monospace;position:fixed;top:0;left:0}
@keyframes rb{0%{border-color:hsl(0,100%,55%)}33%{border-color:hsl(120,100%,50%)}66%{border-color:hsl(240,100%,60%)}100%{border-color:hsl(0,100%,55%)}}
@keyframes rbb{0%{background:linear-gradient(90deg,hsl(0,80%,32%),hsl(60,90%,38%),hsl(120,80%,32%))}50%{background:linear-gradient(90deg,hsl(200,80%,32%),hsl(260,90%,38%),hsl(320,80%,32%))}100%{background:linear-gradient(90deg,hsl(0,80%,32%),hsl(60,90%,38%),hsl(120,80%,32%))}}
#wrap{display:flex;flex-direction:column;width:100%;max-width:430px;margin:0 auto;background:#0a0a0a;border-left:3px solid hsl(0,100%,55%);border-right:3px solid hsl(0,100%,55%);animation:rb 4s linear infinite;overflow:hidden;box-shadow:0 0 24px rgba(255,50,150,0.4)}
#bar{display:flex;align-items:center;height:40px;padding:0 10px;gap:6px;flex-shrink:0;animation:rbb 5s linear infinite}
#bar span{color:#fff;font-size:6px;flex:1;text-shadow:1px 1px 0 #0008;letter-spacing:.5px}
.bb{background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 9px;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.bb:active{opacity:.4;transform:scale(.9)}
#cvwrap{flex:1;display:flex;justify-content:center;align-items:center;background:#000;overflow:hidden;min-height:0}
#cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}
#ctrl{flex-shrink:0;background:#111;border-top:3px solid rgba(255,255,255,0.12);padding:10px 8px 16px;display:flex;flex-direction:column;gap:0}
#ctrl-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
#dpad{display:flex;gap:8px}
#actions{display:flex;gap:8px;align-items:center}
#score-mid{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:65px}
#score-mid .slab{color:#555;font-size:4px}
#score-val{color:#fff;font-size:9px}
#lives-val{color:#888;font-size:4px}
.btn{display:flex;align-items:center;justify-content:center;border-radius:50%;border:3px solid rgba(255,255,255,0.2);color:#fff;font-family:'Press Start 2P',monospace;cursor:pointer;touch-action:manipulation;box-shadow:0 5px 0 rgba(0,0,0,0.7),0 6px 14px rgba(0,0,0,0.5);position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.btn:active,.btn.on{transform:translateY(4px)!important;box-shadow:0 1px 0 rgba(0,0,0,0.7),0 2px 6px rgba(0,0,0,0.5)!important}
#bL{width:70px;height:70px;font-size:24px;background:#1a3a5c;border-color:hsl(210,90%,50%)}
#bR{width:70px;height:70px;font-size:24px;background:#1a4a30;border-color:hsl(150,90%,45%)}
#bJ{width:86px;height:86px;font-size:7px;background:#4a3800;border-color:hsl(45,100%,55%);border-width:4px}
#bA{width:62px;height:62px;font-size:7px;background:#4a1a1a;border-color:hsl(0,90%,55%)}
.btn-lbl{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:4px;color:#555;white-space:nowrap}
#tut{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
#tut-inner{max-width:380px;width:100%;background:#111;border:3px solid hsl(0,100%,55%);border-radius:14px;padding:20px;animation:rb 3s linear infinite}
#tut-title{font-size:9px;text-align:center;margin-bottom:14px;color:#fff;line-height:1.8;background:linear-gradient(90deg,hsl(0,90%,65%),hsl(60,90%,60%),hsl(200,90%,65%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#tut-body{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.tut-row{display:flex;align-items:center;gap:14px;background:#1a1a1a;border-radius:10px;padding:12px 14px}
.tut-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.tut-lines{display:flex;flex-direction:column;gap:7px}
.tut-line{font-size:6px;color:#ccc;line-height:1.6}
#tut-nav{display:flex;justify-content:space-between;align-items:center}
#tut-dots{display:flex;gap:6px}
.tdot{width:8px;height:8px;border-radius:50%;background:#333}
.tdot.on{background:#fff}
#tut-skip{background:transparent;border:2px solid #444;border-radius:6px;color:#666;font-family:'Press Start 2P',monospace;font-size:6px;padding:8px 12px;cursor:pointer;touch-action:manipulation}
#tut-next{background:hsl(120,55%,22%);border:2px solid hsl(120,75%,45%);border-radius:6px;color:#fff;font-family:'Press Start 2P',monospace;font-size:6px;padding:8px 14px;cursor:pointer;touch-action:manipulation}
#tut-skip:active,#tut-next:active{opacity:.6}
</style>
</head>
<body>
<div id="tut">
  <div id="tut-inner">
    <div id="tut-title"></div>
    <div id="tut-body"></div>
    <div id="tut-nav">
      <button id="tut-skip">SKIP</button>
      <div id="tut-dots"></div>
      <button id="tut-next">NEXT</button>
    </div>
  </div>
</div>
<div id="wrap">
  <div id="bar">
    <span>THREAD RIPPER</span>
    <button class="bb" id="pbtn">PAUSE</button>
  </div>
  <div id="cvwrap"><canvas id="cv"></canvas></div>
  <div id="ctrl">
    <div id="ctrl-row">
      <div id="dpad">
        <div class="btn" id="bL">&#9664;<span class="btn-lbl">LEFT</span></div>
        <div class="btn" id="bR">&#9654;<span class="btn-lbl">RIGHT</span></div>
      </div>
      <div id="score-mid">
        <div class="slab">SCORE</div>
        <div id="score-val">0</div>
        <div id="lives-val">&#9829;&#9829;&#9829;</div>
      </div>
      <div id="actions">
<div class="btn" id="bA">ATK<span class="btn-lbl">ATTACK</span></div>
        <div class="btn" id="bJ">JUMP<span class="btn-lbl">JUMP×2=TRICK</span></div>
      </div>
    </div>
  </div>
</div>
<script>
const GW=320,GH=420,GR=0.45,PS=3,JF=-10.5;
const ST={T:0,P:1,PA:2,B:3,LT:4,GO:5,W:6};
const TRK=['KICKFLIP','HEELFLIP','360 FLIP','SHOVE-IT','VARIAL','NOSEGRIND','TAILSLIDE','IMPOSSIBLE'];
const LV=[
  {bg:'#1a0800',mid:'#3d1a00',g:'#2a1000',sky:'#2d1000',acc:'#ff8c00',name:'SNEAKER FACTORY'},
  {bg:'#001a08',mid:'#003d18',g:'#002010',sky:'#001a08',acc:'#00ff80',name:'SKATE PARK'},
  {bg:'#00041a',mid:'#000a3d',g:'#000820',sky:'#000418',acc:'#4488ff',name:'HALL OF FAME'}
];
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('wrap');
let scale=1,mini=false,gState=ST.T,gScore=0,hiSc=+localStorage.getItem('trhi')||0;
let cLv=0,lData=null,enemies=[],pickups=[],boss=null,wizard=null;
let bSpawn=false,bDone=false,wSpawn=false,wDlg=false,wDlgT=0,noBrd=false,noBrdT=0;
let trT=0,ttT=0,wtT=0,sfAmt=0,pCur=0,pSCool=0,pMB=[{},{},{},{},{}];
let lastT=0,player,cam;
var puTimer=10; // first powerup drop after 10s
let parts=[],bgC=[],egT=0,egM=null,egL=0;
var PMENU=['RESUME','MUSIC: ON','HOW TO PLAY','RESTART','QUIT TO TITLE'];

// Tie-dye level-aware
function tdMult(){const b=cLv||0,boss=gState===3?1.5:1;return([0.15,0.5,1.0][Math.min(b,2)])*boss;}
function tdSat(){const b=cLv||0,boss=gState===3?15:0;return[45,68,90][Math.min(b,2)]+boss;}
function td(o,sp,s,l){o=o||0;sp=sp||1;l=l||55;const m=tdMult(),sat=s!==undefined?s:tdSat();return'hsl('+((Date.now()*.07*sp*m+o)%360)+','+sat+'%,'+l+'%)';}
function tda(o,sp,a,s,l){o=o||0;sp=sp||1;a=a||.7;l=l||55;const m=tdMult(),sat=s!==undefined?s:tdSat();return'hsla('+((Date.now()*.07*sp*m+o)%360)+','+sat+'%,'+l+'%,'+a+')';}
function tdg(x1,y1,x2,y2,o,sp){o=o||0;sp=sp||1;const g=ctx.createLinearGradient(x1,y1,x2,y2),m=tdMult(),t=Date.now()*.07*sp*m+o,sat=tdSat();g.addColorStop(0,'hsl('+(t%360)+','+sat+'%,55%)');g.addColorStop(.5,'hsl('+((t+180)%360)+','+Math.min(sat+10,100)+'%,60%)');g.addColorStop(1,'hsl('+((t+300)%360)+','+sat+'%,55%)');return g;}

// Resize
function updateCSSIntensity(){const s=['8s','5s','3s'][Math.min(cLv||0,2)];const w=document.getElementById('wrap');if(w)w.style.animationDuration=s;const b=document.getElementById('bar');if(b)b.style.animationDuration=s;}

function resize(){
  if(mini)return;
  // Use actual window dimensions — works on iPhone, iPad, desktop, iframe
  const WW=window.innerWidth||document.documentElement.clientWidth||320;
  const WH=window.innerHeight||document.documentElement.clientHeight||600;
  const gameW=Math.min(WW,430);

  // Set wrap to fill screen
  const wrapEl=document.getElementById('wrap');
  if(wrapEl){
    wrapEl.style.width=gameW+'px';
    wrapEl.style.height=WH+'px';
    wrapEl.style.maxWidth=gameW+'px';
  }

  // Bar height is fixed at 40px, ctrl height is fixed ~120px
  const barH=40;
  const ctrlEl=document.getElementById('ctrl');
  const ctrlH=ctrlEl?(ctrlEl.offsetHeight>0?ctrlEl.offsetHeight:130):130;
  const availH=WH-barH-ctrlH;

  // Canvas fills available height, constrained by width
  const scaleByW=gameW/GW;
  const scaleByH=availH/GH;
  const s=Math.min(scaleByW,scaleByH);
  const cw2=Math.floor(GW*s);
  const ch=Math.floor(GH*s);

  cv.width=GW;cv.height=GH;
  cv.style.width=cw2+'px';cv.style.height=ch+'px';

  const cvwrap=document.getElementById('cvwrap');
  if(cvwrap){cvwrap.style.height=ch+'px';}

  scale=s;
}
window.addEventListener('resize',function(){setTimeout(resize,80);});
// Fire resize multiple times to handle iOS Safari toolbar show/hide
setTimeout(resize,0);
setTimeout(resize,100);
setTimeout(resize,500);

// minimize removed

// Audio
var AC=null;
// getAC defined in music block
function tone(f,d,t,v,dl){t=t||'square';v=v||.1;dl=dl||0;try{var a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime+dl);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dl+d);o.start(a.currentTime+dl);o.stop(a.currentTime+dl+d);}catch(e){}}
var SFX={
  jump:function(){tone(280,.05);tone(460,.08,'square',.1,.04);},
  trick:function(){[500,650,800,950].forEach(function(f,i){tone(f,.06,'square',.1,i*.04);});},
  gtrick:function(){[600,800,1000,1200].forEach(function(f,i){tone(f,.08,'sine',.14,i*.05);});},
  atk:function(){tone(700,.04);tone(200,.07,'square',.1,.03);},
  hit:function(){tone(90,.18,'sawtooth',.18);},
  eDie:function(){[350,500,700].forEach(function(f,i){tone(f,.07,'square',.1,i*.06);});},
  bHit:function(){tone(75,.22,'sawtooth',.22);},
  bDie:function(){[250,400,600,800,1000].forEach(function(f,i){tone(f,.12,'square',.12,i*.09);});},
  bLost:function(){[400,300,200,100].forEach(function(f,i){tone(f,.15,'sawtooth',.2,i*.1);});},
  bGain:function(){[300,500,700,900].forEach(function(f,i){tone(f,.1,'sine',.14,i*.08);});},
  wiz:function(){[500,700,900,700,1000].forEach(function(f,i){tone(f,.1,'sine',.12,i*.07);});},
  grind:function(){tone(160,.3,'sawtooth',.06);},
  go:function(){[400,300,200,150].forEach(function(f,i){tone(f,.15,'sawtooth',.2,i*.12);});},
  lup:function(){[400,600,800,1000].forEach(function(f,i){tone(f,.1,'square',.1,i*.09);});}
};
// ============================================================
// MUSIC — iOS Safari compatible
// Strategy: unlockAudio() is called on every touch synchronously.
// It calls AC.resume() directly (no .then — iOS blocks async audio).
// startM sets mPending=true; gLoop polls each frame and kicks off
// music the moment AC.state becomes "running".
// ============================================================
var mPlay=false,mIdx=0,mOn=true,mLv=0,mPending=false;
var MN=[
  [262,294,330,262,294,330,392,330],
  [294,330,370,294,330,370,440,370],
  [330,370,415,330,370,415,494,415]
];

function getAC(){
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  return AC;
}

// Called synchronously on every touch — iOS requires this
function unlockAudio(){
  var a=getAC();
  if(a.state!=='running')a.resume(); // synchronous call, no .then needed
}

// Play one note and schedule the next
function _playNote(){
  if(!mPlay||!mOn)return;
  try{
    var a=getAC();
    if(a.state!=='running'){mPending=true;return;} // not ready, gLoop will retry
    var n=MN[Math.min(mLv,2)];
    var o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='square';
    o.frequency.value=n[mIdx%n.length];
    g.gain.setValueAtTime(0.05,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.18);
    o.start(a.currentTime);
    o.stop(a.currentTime+0.20);
    mIdx++;
    mPending=false;
    setTimeout(_playNote,220);
  }catch(e){mPending=true;}
}

function startM(lv){
  stopM();
  if(!mOn)return;
  mPlay=true;mIdx=0;mLv=lv;mPending=true; // always set pending; gLoop starts it
}
function stopM(){mPlay=false;mPending=false;}

// Called every frame from gLoop — starts music when AC is ready
function tickMusic(){
  if(mPending&&mPlay&&mOn){
    var a=getAC();
    if(a.state==='running'){_playNote();}
    else{a.resume();} // keep trying to resume
  }
}

// Input
var keys={};
var touch={L:false,R:false,jp:false,tp:false};
window.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!keys._jh){keys._jp=true;keys._jh=true;}
  if(e.code==='KeyX'||e.code==='KeyZ')keys._ap=true;
  if(e.code==='KeyP')keys._pp=true;
  if(e.code==='Enter')keys._ep=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0)e.preventDefault();
});
window.addEventListener('keyup',function(e){keys[e.code]=false;if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')keys._jh=false;});
function clrK(){keys._jp=false;keys._ap=false;keys._tp=false;keys._pp=false;keys._ep=false;touch.jp=false;touch.tp=false;}

// REAL HTML BUTTONS
var isMob=('ontouchstart' in window)||navigator.maxTouchPoints>0;
function wireBtn(id,onDn,onUp){
  var el=document.getElementById(id);if(!el)return;
  function dn(e){e.preventDefault();e.stopPropagation();el.classList.add('on');onDn();unlockAudio();}
  function up(e){e.preventDefault();e.stopPropagation();el.classList.remove('on');if(onUp)onUp();}
  el.addEventListener('touchstart',dn,{passive:false});el.addEventListener('touchend',up,{passive:false});el.addEventListener('touchcancel',up,{passive:false});
  el.addEventListener('mousedown',dn);el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
}
wireBtn('bL',function(){touch.L=true;},function(){touch.L=false;});
wireBtn('bR',function(){touch.R=true;},function(){touch.R=false;});
wireBtn('bJ',function(){keys._jp=true;},function(){});
wireBtn('bA',function(){keys._ap=true;},function(){});

cv.addEventListener('touchend',function(e){e.preventDefault();unlockAudio();if(gState===ST.T||gState===ST.GO||gState===ST.W){keys._ep=true;}},{passive:false});
cv.addEventListener('click',function(){if(gState===ST.T||gState===ST.GO||gState===ST.W){keys._ep=true;getAC();}});

var pbtn=document.getElementById('pbtn');
function doPause(){getAC();if(gState===ST.P||gState===ST.B){pCur=0;gState=ST.PA;pbtn.textContent='PLAY';}else if(gState===ST.PA){gState=ST.P;pbtn.textContent='PAUSE';}}
pbtn.addEventListener('click',doPause);pbtn.addEventListener('touchend',function(e){e.preventDefault();unlockAudio();doPause();},{passive:false});

cv.addEventListener('touchstart',function(e){
  unlockAudio();
  if(gState!==ST.PA)return;e.preventDefault();
  var r=cv.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(function(t){
    var x=(t.clientX-r.left)*(GW/r.width),y=(t.clientY-r.top)*(GH/r.height);
    pMB.forEach(function(b,i){if(b.x&&x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){pCur=i;setTimeout(doSel,80);}});
  });
},{passive:false});

function updateHUD(){
  var sv=document.getElementById('score-val');if(sv)sv.textContent=gScore;
  var lv=document.getElementById('lives-val');if(lv&&player)lv.textContent='\u2665'.repeat(Math.max(0,player.lives));
}

// Tutorial
var TUT_KEY='trTutV6';
// ── SAVE SYSTEM ──
var SAVE_KEY='trSave1';
function getSave(){try{var s=localStorage.getItem(SAVE_KEY);return s?JSON.parse(s):{level:0};}catch(e){return{level:0};}}
function setSave(data){try{localStorage.setItem(SAVE_KEY,JSON.stringify(data));}catch(e){}}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

var tutIdx=0,tutFromPause=false;
// Tutorial pages — story first, then controls, then powerups
var TUT_PAGES=[
  {type:'story'},
  {type:'controls'},
  {type:'powerups'}
];
function showTut(fp){tutIdx=0;tutFromPause=!!fp;renderTut();document.getElementById('tut').style.display='flex';}
function closeTut(){document.getElementById('tut').style.display='none';localStorage.setItem(TUT_KEY,'1');getAC();tutFromPause=false;}

function renderTut(){
  var p=TUT_PAGES[tutIdx];
  if(!p){closeTut();return;}
  var title=document.getElementById('tut-title');
  var body=document.getElementById('tut-body');
  body.innerHTML='';

  // ── PAGE 1: STORY ──
  if(p.type==='story'){
    title.textContent='THREAD RIPPER';
    var card=document.createElement('div');
    card.style.cssText='background:#0a0a14;border:2px solid rgba(255,100,50,.35);border-radius:10px;padding:16px 14px;';
    card.innerHTML=
      '<div style="font-size:5px;color:#aaa;line-height:2.3;letter-spacing:.3px;">'
      +'Deep in Sneaker City, a pair of animated laces named '
      +'<b style="color:#FFD700">LACE</b> lived to skate.'
      +' One day the evil <b style="color:#CC44CC">Velcro Viktor</b> '
      +'ripped their board clean off their feet.</div>'
      +'<div style="font-size:5px;color:#aaa;line-height:2.3;margin-top:10px;letter-spacing:.3px;">'
      +'Lace must battle through three worlds — '
      +'<b style="color:#ff8c00">Sneaker Factory</b>, '
      +'<b style="color:#00ff80">Skate Park</b>, and '
      +'<b style="color:#4488ff">Hall of Fame</b> — '
      +'to defeat the bosses and reclaim the board.'
      +' A Wizard waits at the end with '
      +'<b style="color:#FFD700">the legendary Glow Board</b>.'
      +'</div>'
      +'<div style="font-size:5px;color:#666;line-height:2;margin-top:10px;">Thread your story. Lace up. Let\'s ride.</div>';
    body.appendChild(card);
  }

  // ── PAGE 2: CONTROLS ──
  else if(p.type==='controls'){
    title.textContent='CONTROLS';

    // Icon builder — pure CSS shapes, no emoji
    function mkIcon(html, bg, border){
      var d=document.createElement('div');
      d.style.cssText='width:52px;height:52px;border-radius:50%;background:'+bg
        +';border:3px solid '+border
        +';display:flex;align-items:center;justify-content:center;flex-shrink:0;';
      d.innerHTML=html;
      return d;
    }
    function mkRow(icon, label, desc){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:14px;background:#1a1a1a;border-radius:10px;padding:11px 12px;margin-bottom:8px;';
      var txt=document.createElement('div');
      txt.innerHTML='<div style="font-size:7px;color:#fff;margin-bottom:5px;letter-spacing:.3px;">'+label+'</div>'
        +'<div style="font-size:5px;color:#777;line-height:1.8;">'+desc+'</div>';
      row.appendChild(icon);row.appendChild(txt);
      return row;
    }

    if(isMob){
      // Left/Right: two arrow triangles side by side
      var arrowSvg='<svg width="36" height="20" viewBox="0 0 36 20" fill="none" xmlns="http://www.w3.org/2000/svg">'
        +'<polygon points="10,2 10,18 1,10" fill="#7EC8FF"/>'
        +'<polygon points="26,2 26,18 35,10" fill="#7EC8FF"/>'
        +'</svg>';

function Player(){this.x=40;this.y=GH-80;this.w=26;this.h=28;this.vx=0;this.vy=0;this.og=false;this.jl=1;this.hp=5;this.lives=3;this.ac=0;this.atk=false;this.at=0;this.ht=0;this.wt=0;this.st=0;this.fr=true;this.af=0;this.aT=0;this.hB=true;this.gB=false;this.tT=0;this.tCool=0;this.gT=0;this.onR=false;this.dj=true;this.shieldT=0;this.bigAtk=0;}
Player.prototype.upd=function(dt,plats){
  if(this.ht>0)this.ht-=dt;if(this.ac>0)this.ac-=dt;if(this.shieldT>0)this.shieldT-=dt;if(this.bigAtk>0)this.bigAtk-=dt;
  if(this.at>0){this.at-=dt;this.atk=true;}else this.atk=false;
  if(this.wt>0)this.wt-=dt;if(this.st>0)this.st-=dt;if(this.tT>0)this.tT-=dt;if(this.tCool>0)this.tCool-=dt;
  var sp=this.wt>0?PS*2.2:this.st>0?PS*.5:PS;
  if(keys.ArrowLeft||keys.KeyA||touch.L){this.vx=-sp;this.fr=false;}
  else if(keys.ArrowRight||keys.KeyD||touch.R){this.vx=sp;this.fr=true;}
  else this.vx*=.82;
  if(keys._jp){
    if(this.og){
      // First jump — leave ground
      this.vy=JF;this.og=false;
      this.jl=this.dj?1:0; // 1 = one more jump left
      SFX.jump();
    } else if(this.dj&&this.jl>0){
      // DOUBLE JUMP — Smash style: jump + auto trick!
      this.vy=JF*.85;this.jl=0;
      SFX.jump();
      // Auto-trigger trick on double jump
      if(this.hB&&this.tCool<=0)this.doTrick();
    }
  }
  if(keys._ap&&this.ac<=0){this.ac=.42;this.at=.26;SFX.atk();}
  this.vy+=GR;this.x+=this.vx;this.y+=this.vy;
  this.og=false;this.onR=false;
  var self=this;
  plats.forEach(function(p){if(self.x+self.w>p.x&&self.x<p.x+p.w&&self.y+self.h>p.y&&self.y+self.h<p.y+p.h+14&&self.vy>=0){self.y=p.y-self.h;self.vy=0;self.og=true;self.jl=self.dj?2:1;if(p.type==='cv')self.x+=p.d*.9;if(p.type==='rl'&&self.hB){self.onR=true;self.gT+=dt;if(self.gT>.3){SFX.grind();self.gT=0;spP(self.x+self.w/2,self.y+self.h,td(60,3),4,1.5);}}else self.gT=0;}});
  if(this.y>GH+50){this.y=GH-80;this.vy=0;this.dmg(1);}
  this.x=Math.max(0,this.x);
  this.aT+=dt;if(this.aT>.1){this.af=(this.af+1)%4;this.aT=0;}
};
Player.prototype.doTrick=function(){var t=TRK[Math.floor(Math.random()*TRK.length)];this.tT=.5;this.tCool=.3;spTx(this.x+this.w/2,this.y-8,t);this.gB?SFX.gtrick():SFX.trick();gScore+=this.gB?150:50;spP(this.x+this.w/2,this.y+this.h/2,td(Math.random()*360,1),5,1.5);};
Player.prototype.dmg=function(a){if(this.ht>0||this.shieldT>0)return;this.hp-=a;this.ht=.9;SFX.hit();if(this.hp<=0){this.lives--;if(this.lives>0){this.hp=5;this.x=40;this.y=GH-80;this.vy=0;}}};
Player.prototype.ab=function(){if(!this.atk)return null;var aw=this.bigAtk>0?72:52;return{x:this.fr?this.x+this.w:this.x-aw,y:this.y,w:aw,h:this.h+4};};
Player.prototype.drw=function(){
  var x=this.x,y=this.y,f=this.af;
  var fl=this.ht>0&&Math.floor(this.ht*10)%2===0;
  if(fl)ctx.globalAlpha=.35;
  var bY=y+this.h-6,ts=this.tT>0?(1-this.tT/.5)*Math.PI*2:0;
  ctx.save();
  if(this.tT>0){ctx.translate(x+this.w/2,y+this.h/2);ctx.rotate(ts*(this.fr?1:-1));ctx.translate(-(x+this.w/2),-(y+this.h/2));}
  if(this.hB){
    var bc=this.gB?tdg(x-2,bY,x+this.w+2,bY,0,2):td(f*40,.8,80,50);
    ctx.fillStyle=bc;ctx.fillRect(x-4,bY,this.w+8,5);
    ctx.fillStyle=this.gB?td(120,2):td(20,.8,70,45);
    ctx.beginPath();ctx.moveTo(x-4,bY);ctx.lineTo(x-8,bY-3);ctx.lineTo(x-4,bY+5);ctx.fill();
    ctx.beginPath();ctx.moveTo(x+this.w+4,bY);ctx.lineTo(x+this.w+8,bY-3);ctx.lineTo(x+this.w+4,bY+5);ctx.fill();
    ctx.fillStyle=this.gB?td(240,3):'#555';
    ctx.beginPath();ctx.arc(x,bY+6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+this.w,bY+6,4,0,Math.PI*2);ctx.fill();
    if(this.gB){ctx.globalAlpha=(fl?.15:.25)+Math.sin(Date.now()*.006)*.12;ctx.fillStyle=td(0,3,100,70);ctx.fillRect(x-7,bY-2,this.w+14,15);ctx.globalAlpha=fl?.35:1;}
  }else{ctx.fillStyle='#555';ctx.fillRect(x+2,y+this.h-4,10,4);ctx.fillRect(x+14,y+this.h-4,10,4);}
  var c1=this.wt>0?'#4CAF50':td(0,1,95,55),c2=this.wt>0?'#FFD700':td(120,1,90,70);
  for(var i=0;i<5;i++){var sy=y+i*4,wb=Math.sin(f*1.5+i)*2;ctx.fillStyle=i%2===0?c1:c2;if(this.fr){ctx.fillRect(x+wb,sy,6,3);ctx.fillRect(x+10-wb,sy,6,3);}else{ctx.fillRect(x+14+wb,sy,6,3);ctx.fillRect(x+4-wb,sy,6,3);}}
  ctx.fillStyle='#CCC';if(this.fr){ctx.fillRect(x+16,y+18,5,4);ctx.fillRect(x+16,y+10,5,4);}else{ctx.fillRect(x-1,y+18,5,4);ctx.fillRect(x-1,y+10,5,4);}
  ctx.fillStyle='#FFF';ctx.fillRect(x+5,y+2,5,4);ctx.fillRect(x+12,y+2,5,4);
  ctx.fillStyle='#000';ctx.fillRect(x+6+(this.fr?1:-1),y+3,2,2);ctx.fillRect(x+13+(this.fr?1:-1),y+3,2,2);
  if(this.gB)for(var i=0;i<3;i++){var sx=x+5+i*8,sy2=y-4+Math.sin(Date.now()*.008+i)*3;ctx.fillStyle=td(i*120,3,100,75);ctx.fillRect(sx,sy2,2,2);}
  var self=this;
  if(this.atk){
    var aw2=this.bigAtk>0?72:52;
    var ax=this.fr?x+this.w:x;
    // Two-phase: snap out (first 40%) then whip back (last 60%)
    var prog=1-(this.at/0.26);
    var phase=prog<0.4?(prog/0.4):(1-(prog-0.4)/0.6);
    var reach=aw2*phase;
    var tipX=this.fr?ax+reach:ax-reach;
    // Base tip height — mid-body
    var tipY=y+this.h*0.4;
    // Angle toward nearest enemy — subtle, 18% lean max
    if(typeof enemies!=='undefined'){
      var nearest=null,nd=9999;
      enemies.forEach(function(e){
        if(!e.alive)return;
        var ex=e.x+e.w/2,ey=e.y+e.h/2;
        var facing=self.fr?(ex>x):(ex<x);
        var d=Math.abs(ex-x);
        if(facing&&d<100&&d<nd){nd=d;nearest=e;}
      });
      if(nearest){tipY+=((nearest.y+nearest.h/2)-tipY)*0.18;}
    }
    // Whip arc — control point above midway, giving a satisfying crack shape
    var cpX=ax+(this.fr?reach*0.55:-reach*0.55);
    var cpY=tipY-8-phase*6;
    // Outer glow
    ctx.globalAlpha=0.18+phase*0.12;
    ctx.strokeStyle=this.gB?td(30,4,100,90):'rgba(255,255,200,1)';
    ctx.lineWidth=this.gB?10:7;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ax,y+this.h*0.4);ctx.quadraticCurveTo(cpX,cpY,tipX,tipY);ctx.stroke();
    // Main whip stroke
    ctx.globalAlpha=1;
    ctx.strokeStyle=this.gB?td(40,3,100,72):td(45,1.5,88,62);
    ctx.lineWidth=this.gB?3:2;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ax,y+this.h*0.4);ctx.quadraticCurveTo(cpX,cpY,tipX,tipY);ctx.stroke();
    // Tip — bright flash at snap peak, fades on recoil
    var tipR=phase>0.35?4:2;
    ctx.fillStyle=this.gB?td(60,4,100,95):'#FFFFA0';
    ctx.globalAlpha=phase>0.3?1:0.5;
    ctx.beginPath();ctx.arc(tipX,tipY,tipR,0,Math.PI*2);ctx.fill();
    // Small crack sparks at tip peak
    if(phase>0.35&&phase<0.55){
      ctx.globalAlpha=0.7;
      ctx.strokeStyle=this.gB?td(0,4,100,90):'#FFE040';
      ctx.lineWidth=1;
      for(var si=0;si<3;si++){
        var sa=(si/3)*Math.PI-(this.fr?0:Math.PI);
        ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(tipX+Math.cos(sa)*7,tipY+Math.sin(sa)*5);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;ctx.lineCap='butt';
  }
  ctx.restore();ctx.globalAlpha=1;
};

// ============================================================
// ENEMIES — 6 Spiffy-universe characters
//
//  gs  Grungy Sneaker   HP 2  bounces toward you, easy to read
//  kl  Killer Knot      HP 2  low crawling knot of laces, speeds up
//  sg  Sock Gremlin     HP 2  chaotic slider, changes direction
//  db  Dirty Boot       HP 3  slow stomper, wide hitbox, intimidating
//  lh  Lace Hater       HP 2  sprint-charge + retreat pattern
//  wz  Worn-Out Zap     HP 3  slow mover, pulses zap aura
//
// All: min size 20x18 — always hittable, always readable
// ============================================================
function Enemy(t,x,y){
  this.t=t;this.x=x;this.y=y;this.vx=0;this.vy=0;this.alive=true;
  this.af=0;this.aT=0;this.zt=0;this.chg=false;this.chgT=1;this.gT=0;
  if(t==='gs'){this.w=22;this.h=20;this.hp=2;}
  else if(t==='kl'){this.w=26;this.h=16;this.hp=2;this.vx=-1.2;}
  else if(t==='sg'){this.w=20;this.h=22;this.hp=2;this.vx=-.9;}
  else if(t==='db'){this.w=30;this.h=26;this.hp=3;this.vx=-.4;}
  else if(t==='lh'){this.w=20;this.h=20;this.hp=2;this.chgT=1.5;}
  else if(t==='wz'){this.w=22;this.h=24;this.hp=3;this.vx=-.5;}
  else{this.w=20;this.h=20;this.hp=2;}
}

Enemy.prototype.upd=function(dt,pl,plats){
  this.aT+=dt;if(this.aT>.1){this.af=(this.af+1)%4;this.aT=0;}
  var t=this.t,dx=pl.x-this.x,self=this;
  var land=function(extra){extra=extra||0;plats.forEach(function(p){if(self.x+self.w>p.x&&self.x<p.x+p.w&&self.y+self.h>p.y&&self.y+self.h<p.y+p.h+12+extra&&self.vy>=0){self.y=p.y-self.h;self.vy=0;}});};

  if(t==='gs'){
    // Grungy Sneaker: ambles toward player, bounces on landing
    this.vx=dx>0?1.1:-1.1;
    this.vy+=GR;this.x+=this.vx;this.y+=this.vy;
    plats.forEach(function(p){if(self.x+self.w>p.x&&self.x<p.x+p.w&&self.y+self.h>p.y&&self.y+self.h<p.y+p.h+14&&self.vy>=0){self.y=p.y-self.h;self.vy=-3.5-Math.random();}});
  }
  else if(t==='kl'){
    // Killer Knot: low ground crawler, bursts of speed when near
    this.vx=Math.abs(dx)<100?(dx>0?2.2:-2.2):(dx>0?1.1:-1.1);
    this.x+=this.vx;this.vy+=GR*.5;this.y+=this.vy;land();
  }
  else if(t==='sg'){
    // Sock Gremlin: erratic direction changes
    this.gT-=dt;
    if(this.gT<=0){this.vx=(dx>0?1:-1)*(.8+Math.random()*.6);this.gT=.8+Math.random()*1.2;}
    this.x+=this.vx;this.vy+=GR*.5;this.y+=this.vy;land();
  }
  else if(t==='db'){
    // Dirty Boot: slow and heavy, never stops
    this.vx=dx>0?.5:-.5;
    this.x+=this.vx;this.vy+=GR*.6;this.y+=this.vy;land();
  }
  else if(t==='lh'){
    // Lace Hater: pause → sprint → retreat cycle
    this.chgT-=dt;
    if(this.chg){
      this.vx=dx>0?3.8:-3.8;
      if(this.chgT<=0){this.chg=false;this.chgT=1.2+Math.random()*.8;}
    } else {
      this.vx=dx>0?-.6:.6; // back off between charges
      if(this.chgT<=0){this.chg=true;this.chgT=.35+Math.random()*.2;}
    }
    this.x+=this.vx;this.vy+=GR*.5;this.y+=this.vy;land();
  }
  else if(t==='wz'){
    // Worn-Out Zap: slow, pulses electric damage aura every 2s
    this.vx=dx>0?.45:-.45;this.zt+=dt;
    this.x+=this.vx;this.vy+=GR*.4;this.y+=this.vy;land();
    if(this.zt>2){
      this.zt=0;
      var dist=Math.sqrt(dx*dx+Math.pow(pl.y-this.y,2));
      if(dist<60){pl.dmg(1);spP(this.x+11,this.y+8,td(200,3,100,65),8,2.5);}
    }
  }

  // Universal hit detection
  var ab=pl.ab();
  if(ab&&rov(ab,this)&&!this._h){
    this._h=true;this.hp--;SFX.bHit();
    if(this.hp<=0){
      this.alive=false;
      spP(this.x+this.w/2,this.y+this.h/2,td(Math.random()*360,1),10,2.5);
      SFX.eDie();
      gScore+=20;
      return;
    }
  } else if(!ab){this._h=false;}
  if(!pl.atk&&rov(this,pl))pl.dmg(1);
};

    // Arms — skeletal with sceptre

    ctx.beginPath();ctx.moveTo(x+4,y+18);ctx.lineTo(x-10,y+28);ctx.stroke();

    // Sceptre in right hand

  // Box
  ctx.fillStyle='#0e0e0e';ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle=td(0,1.5);ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  ctx.strokeStyle=td(120,1);ctx.lineWidth=1;ctx.strokeRect(px+3,py+3,pw-6,ph-6);
  // Title
  ctx.fillStyle=tdg(GW/2-42,py+22,GW/2+42,py+22,0,2);
  ctx.font='9px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('PAUSED',GW/2,py+22);
  ctx.strokeStyle=td(180,1);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+12,py+32);ctx.lineTo(px+pw-12,py+32);ctx.stroke();
  // Menu items
  var menuItems=[
    {label:'RESUME',         col:'#88FF88'},
    {label:'MUSIC: '+(mOn?'ON':'OFF'), col:mOn?'#88FFCC':'#FF8888'},
    {label:'HOW TO PLAY',   col:'#88CCFF'},
    {label:'RESTART',       col:'#FFCC44'},
    {label:'QUIT TO TITLE', col:'#FF8888'}
  ];
  menuItems.forEach(function(item,i){
    var iy=py+50+i*36,sel=i===pCur;
    if(sel){
      ctx.fillStyle=tda(i*72,1.5,.5);
      ctx.fillRect(px+10,iy-16,pw-20,24);
    }
    ctx.fillStyle=sel?item.col:'#888';
    ctx.font='6px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(item.label,GW/2,iy);
    if(sel){
      // Arrow indicator
      ctx.fillStyle=item.col;
      ctx.beginPath();ctx.moveTo(px+18,iy-4);ctx.lineTo(px+25,iy-9);ctx.lineTo(px+25,iy+1);ctx.closePath();ctx.fill();
    }
    pMB[i]={x:px+10,y:iy-17,w:pw-20,h:26};
  });
  ctx.fillStyle='rgba(70,70,70,.7)';ctx.font='4px "Press Start 2P"';
  ctx.fillText('TAP TO SELECT',GW/2,py+ph-8);ctx.textAlign='left';
}
function drwWDlg(){if(!wDlg)return;ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(8,GH-62,GW-16,50);ctx.strokeStyle=td(0,2);ctx.lineWidth=2;ctx.strokeRect(8,GH-62,GW-16,50);ctx.fillStyle='#FFF';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('WIZARD: "TAKE THE GLOW BOARD!',GW/2,GH-46);ctx.fillText('ANCIENT SKATE MAGIC AWAITS!"',GW/2,GH-32);ctx.fillStyle=td(60,2);ctx.fillText('[GLOW BOARD OBTAINED!]',GW/2,GH-18);ctx.textAlign='left';}
function drwNBD(){if(!noBrd)return;ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(8,GH-54,GW-16,42);ctx.strokeStyle='#F44';ctx.lineWidth=2;ctx.strokeRect(8,GH-54,GW-16,42);ctx.fillStyle='#F44';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('VIKTOR STOLE YOUR BOARD!',GW/2,GH-38);ctx.fillText('FIND THE WIZARD!',GW/2,GH-24);ctx.textAlign='left';}

function doSel(){
  if(pCur===0){gState=ST.P;pbtn.textContent='PAUSE';}           // RESUME
  else if(pCur===1){                                              // MUSIC toggle
    mOn=!mOn;
    if(mOn)startM(cLv);else stopM();
    return; // stay in pause menu
  }
  else if(pCur===2){gState=ST.P;showTut(true);}                 // HOW TO PLAY
  else if(pCur===3){restart(0);}                                 // RESTART
  else{stopM();gState=ST.T;ttT=0;parts=[];bgC=[];pbtn.textContent='PAUSE';} // QUIT
  pCur=0;
}

function initLv(i){
  cLv=i;lData=mkLv(i);
  enemies=lData.en.map(function(e){return new Enemy(e.t,e.x,e.y);});
  pickups=(lData.pk||[]).map(function(p){return new Pickup(p.t,p.x,p.y);});
  wizard=null;bSpawn=true;bDone=false;wSpawn=false;wDlg=false;noBrd=false;puTimer=10;
  cam=new Camera();player.x=40;player.y=GH-80;player.vx=0;player.vy=0;
  if(i===2&&!player.gB)player.hB=false;
  // Spawn boss at end of world immediately — he's waiting there
  var bossTypes=['kn','vk','ul'];
  boss=new Boss(bossTypes[i],lData.bX);
  startM(i);updateCSSIntensity();setTimeout(resize,100);
}

function restart(fromLv){
  player=new Player();gScore=0;parts=[];bgC=[];
  var lv=fromLv||0;
  initLv(lv);gState=ST.LT;trT=2;pbtn.textContent='PAUSE';
  if(!localStorage.getItem(TUT_KEY))showTut();
}
function continueGame(){
  var save=getSave();
  var lv=Math.min(save.level||0,2);
  restart(lv);
}
function newGame(){
  clearSave();restart(0);
}

function gLoop(ts){
  var dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  tickMusic(); // poll each frame — starts music when iOS AC becomes ready
  requestAnimationFrame(gLoop);
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);

  if(gState===ST.T){
    ttT+=dt;if(Math.random()<dt*.5)spCrit();updCrit(dt);drwTitle(ttT);
    if(keys._ep||keys._jp){var sv=getSave();if(sv.level>0)continueGame();else restart();getAC();}
  }
  else if(gState===ST.LT){
    trT-=dt;updCrit(dt);drwLvl(cLv);if(trT<=0)gState=ST.P;
  }
  else if(gState===ST.P||gState===ST.B){
    // Boss activation: player enters arena (within 320px of boss)
    if(boss&&!boss.activated&&player.x+cam.x>lData.bX-320){
      boss.activated=true;boss.arenaW=lData.arenaW||340;boss.entT=0;boss.entDone=false;
      boss.vx=1.1;boss.y=boss.targetY;
      gState=ST.B;sfAmt=0.9;
      for(var _i=0;_i<16;_i++)spP(boss.x+boss.w/2,boss.y+boss.h/2,td(_i*22,3),7,4);
      SFX.bHit();
      showDlg(boss.t,'approach');
    }
    if(cLv===2&&bDone&&!wSpawn){wSpawn=true;wizard=new Wizard(player.x+200);}
    player.upd(dt,lData.plat);
    // Hard wall: player cannot walk past boss fort entrance until boss is dead
    if(boss&&!bDone){
      var wallR=boss.bossX+boss.arenaW;
      if(player.x+player.w>wallR){player.x=wallR-player.w;player.vx=0;}
    }
    cam.upd(player,lData.w);
    enemies.forEach(function(e){e.upd(dt,player,lData.plat);if(e.sk){e.sk.forEach(function(k){enemies.push(k);});e.sk=null;}});
    enemies=enemies.filter(function(e){return e.alive;});
    pickups.forEach(function(p){p.upd(dt,player);});pickups=pickups.filter(function(p){return p.alive;});
    if(wizard)wizard.upd(dt,player);
    updP();if(Math.random()<dt*.3)spCrit();updCrit(dt);gScore+=Math.floor(dt*8);
    // Random powerup drops every ~12-18s
    puTimer-=dt;if(puTimer<=0){puTimer=12+Math.random()*8;var puTypes=['h','h','sp','sh','bi','w'];var pt=puTypes[Math.floor(Math.random()*puTypes.length)];var px3=player.x+40+Math.random()*120;pickups.push(new Pickup(pt,Math.min(px3,lData.w-30),GH-80));}
    if(boss){boss.upd(dt,player);if(!boss.alive&&!bDone){bDone=true;gScore+=500*(cLv+1);SFX.lup();
      if(cLv===1){setTimeout(function(){player.hB=false;noBrd=true;noBrdT=6;SFX.bLost();sfAmt=.5;},1200);setSave({level:2});setTimeout(function(){cLv=2;initLv(2);gState=ST.LT;trT=2.5;},4000);}
      else if(cLv===0){setSave({level:1});setTimeout(function(){cLv=1;initLv(1);gState=ST.LT;trT=2.5;},2500);}
      else{setSave({level:3});setTimeout(function(){gState=ST.W;wtT=0;stopM();},3000);}}}
    if(noBrd){noBrdT-=dt;if(noBrdT<=0)noBrd=false;}
    if(wDlg){wDlgT-=dt;if(wDlgT<=0)wDlg=false;}
    // Level ends only when boss is defeated (eX check removed — boss must be beaten)
    if(player.lives<=0){stopM();SFX.go();if(gScore>hiSc){hiSc=gScore;localStorage.setItem('trhi',''+hiSc);}gState=ST.GO;}
    drwBg(cLv,cam.x);ctx.save();cam.on();drwFort(cLv,lData.bX,cam.x);drwPlat(lData.plat);pickups.forEach(function(p){p.drw();});enemies.forEach(function(e){e.drw();});if(wizard)wizard.drw();if(boss)boss.drw();player.drw();drwP();cam.off();ctx.restore();
    drwHUD(player);drwWDlg();drwNBD();drwDlg();drwScan();
    updDlg(dt);
    if(keys._pp){pCur=0;gState=ST.PA;pbtn.textContent='PLAY';}
  }
  else if(gState===ST.PA){
    drwBg(cLv,cam.x);drwPause();drwScan();
    if(pSCool>0)pSCool-=dt;
    if((keys.ArrowUp||keys.KeyW)&&pSCool<=0){pCur=(pCur+PMENU.length-1)%PMENU.length;pSCool=.18;}
    if((keys.ArrowDown||keys.KeyS)&&pSCool<=0){pCur=(pCur+1)%PMENU.length;pSCool=.18;}
    if(keys._pp){pCur=0;gState=ST.P;pbtn.textContent='PAUSE';}
    if(keys._ep||keys._jp)doSel();
  }
  else if(gState===ST.GO){drwGO();drwScan();if(keys._ep||keys._jp)restart();}
  else if(gState===ST.W){wtT+=dt;drwWin(wtT);drwScan();if(keys._ep||keys._jp)restart();}

  if(sfAmt>0){ctx.fillStyle='rgba(255,255,255,'+sfAmt+')';ctx.fillRect(0,0,GW,GH);sfAmt=Math.max(0,sfAmt-.04);}
  clrK();
}
requestAnimationFrame(function(t){lastT=t;requestAnimationFrame(gLoop);});
</script>
