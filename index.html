<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>THREAD RIPPER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{background:#0a0a0a;overflow:hidden;height:100%;width:100%;touch-action:none;font-family:'Press Start 2P',monospace;position:fixed;top:0;left:0}
@keyframes rb{0%{border-color:hsl(0,100%,55%)}33%{border-color:hsl(120,100%,50%)}66%{border-color:hsl(240,100%,60%)}100%{border-color:hsl(0,100%,55%)}}
@keyframes rbb{0%{background:linear-gradient(90deg,hsl(0,80%,32%),hsl(60,90%,38%),hsl(120,80%,32%))}50%{background:linear-gradient(90deg,hsl(200,80%,32%),hsl(260,90%,38%),hsl(320,80%,32%))}100%{background:linear-gradient(90deg,hsl(0,80%,32%),hsl(60,90%,38%),hsl(120,80%,32%))}}
#wrap{display:flex;flex-direction:column;width:100%;max-width:430px;margin:0 auto;background:#0a0a0a;border-left:3px solid hsl(0,100%,55%);border-right:3px solid hsl(0,100%,55%);animation:rb 4s linear infinite;overflow:hidden;box-shadow:0 0 24px rgba(255,50,150,0.4)}
#bar{display:flex;align-items:center;height:40px;padding:0 10px;gap:6px;flex-shrink:0;animation:rbb 5s linear infinite}
#bar span{color:#fff;font-size:6px;flex:1;text-shadow:1px 1px 0 #0008;letter-spacing:.5px}
.bb{background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 9px;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.bb:active{opacity:.4;transform:scale(.9)}
#cvwrap{flex:1;display:flex;justify-content:center;align-items:center;background:#000;overflow:hidden;min-height:0}
#cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}
#ctrl{flex-shrink:0;background:#111;border-top:3px solid rgba(255,255,255,0.12);padding:10px 8px 16px;display:flex;flex-direction:column;gap:0}
#ctrl-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
#dpad{display:flex;gap:8px}
#actions{display:flex;gap:8px;align-items:center}
#score-mid{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:65px}
#score-mid .slab{color:#555;font-size:4px}
#score-val{color:#fff;font-size:9px}
#lives-val{color:#888;font-size:4px}
.btn{display:flex;align-items:center;justify-content:center;border-radius:50%;border:3px solid rgba(255,255,255,0.2);color:#fff;font-family:'Press Start 2P',monospace;cursor:pointer;touch-action:manipulation;box-shadow:0 5px 0 rgba(0,0,0,0.7),0 6px 14px rgba(0,0,0,0.5);position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.btn:active,.btn.on{transform:translateY(4px)!important;box-shadow:0 1px 0 rgba(0,0,0,0.7),0 2px 6px rgba(0,0,0,0.5)!important}
#bL{width:70px;height:70px;font-size:24px;background:#1a3a5c;border-color:hsl(210,90%,50%)}
#bR{width:70px;height:70px;font-size:24px;background:#1a4a30;border-color:hsl(150,90%,45%)}
#bJ{width:86px;height:86px;font-size:7px;background:#4a3800;border-color:hsl(45,100%,55%);border-width:4px}
#bA{width:62px;height:62px;font-size:7px;background:#4a1a1a;border-color:hsl(0,90%,55%)}
.btn-lbl{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:4px;color:#555;white-space:nowrap}
#tut{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
#tut-inner{max-width:380px;width:100%;background:#111;border:3px solid hsl(0,100%,55%);border-radius:14px;padding:20px;animation:rb 3s linear infinite}
#tut-title{font-size:9px;text-align:center;margin-bottom:14px;color:#fff;line-height:1.8;background:linear-gradient(90deg,hsl(0,90%,65%),hsl(60,90%,60%),hsl(200,90%,65%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#tut-body{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.tut-row{display:flex;align-items:center;gap:14px;background:#1a1a1a;border-radius:10px;padding:12px 14px}
.tut-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.tut-lines{display:flex;flex-direction:column;gap:7px}
.tut-line{font-size:6px;color:#ccc;line-height:1.6}
#tut-nav{display:flex;justify-content:space-between;align-items:center}
#tut-dots{display:flex;gap:6px}
.tdot{width:8px;height:8px;border-radius:50%;background:#333}
.tdot.on{background:#fff}
#tut-skip{background:transparent;border:2px solid #444;border-radius:6px;color:#666;font-family:'Press Start 2P',monospace;font-size:6px;padding:8px 12px;cursor:pointer;touch-action:manipulation}
#tut-next{background:hsl(120,55%,22%);border:2px solid hsl(120,75%,45%);border-radius:6px;color:#fff;font-family:'Press Start 2P',monospace;font-size:6px;padding:8px 14px;cursor:pointer;touch-action:manipulation}
#tut-skip:active,#tut-next:active{opacity:.6}
</style>
</head>
<body>
<div id="tut">
  <div id="tut-inner">
    <div id="tut-title"></div>
    <div id="tut-body"></div>
    <div id="tut-nav">
      <button id="tut-skip">SKIP</button>
      <div id="tut-dots"></div>
      <button id="tut-next">NEXT</button>
    </div>
  </div>
</div>
<div id="wrap">
  <div id="bar">
    <span>THREAD RIPPER</span>
    <button class="bb" id="pbtn">PAUSE</button>
  </div>
  <div id="cvwrap"><canvas id="cv"></canvas></div>
  <div id="ctrl">
    <div id="ctrl-row">
      <div id="dpad">
        <div class="btn" id="bL">&#9664;<span class="btn-lbl">LEFT</span></div>
        <div class="btn" id="bR">&#9654;<span class="btn-lbl">RIGHT</span></div>
      </div>
      <div id="score-mid">
        <div class="slab">SCORE</div>
        <div id="score-val">0</div>
        <div id="lives-val">&#9829;&#9829;&#9829;</div>
      </div>
      <div id="actions">
<div class="btn" id="bA">ATK<span class="btn-lbl">ATTACK</span></div>
        <div class="btn" id="bJ">JUMP<span class="btn-lbl">JUMP×2=TRICK</span></div>
      </div>
    </div>
  </div>
</div>
<script>
const GW=320,GH=420,GR=0.45,PS=3,JF=-10.5;
const ST={T:0,P:1,PA:2,B:3,LT:4,GO:5,W:6};
const TRK=['KICKFLIP','HEELFLIP','360 FLIP','SHOVE-IT','VARIAL','NOSEGRIND','TAILSLIDE','IMPOSSIBLE'];
const LV=[
  {bg:'#1a0800',mid:'#3d1a00',g:'#2a1000',sky:'#2d1000',acc:'#ff8c00',name:'SNEAKER FACTORY'},
  {bg:'#001a08',mid:'#003d18',g:'#002010',sky:'#001a08',acc:'#00ff80',name:'SKATE PARK'},
  {bg:'#00041a',mid:'#000a3d',g:'#000820',sky:'#000418',acc:'#4488ff',name:'HALL OF FAME'}
];
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('wrap');
let scale=1,mini=false,gState=ST.T,gScore=0,hiSc=+localStorage.getItem('trhi')||0;
let cLv=0,lData=null,enemies=[],pickups=[],boss=null,wizard=null;
let bSpawn=false,bDone=false,wSpawn=false,wDlg=false,wDlgT=0,noBrd=false,noBrdT=0;
let trT=0,ttT=0,wtT=0,sfAmt=0,pCur=0,pSCool=0,pMB=[{},{},{},{}];
let lastT=0,player,cam;
var puTimer=10; // first powerup drop after 10s
let parts=[],bgC=[],egT=0,egM=null,egL=0;
const PMENU=['RESUME','HOW TO PLAY','RESTART','QUIT TO TITLE'];

// Tie-dye level-aware
function tdMult(){const b=cLv||0,boss=gState===3?1.5:1;return([0.15,0.5,1.0][Math.min(b,2)])*boss;}
function tdSat(){const b=cLv||0,boss=gState===3?15:0;return[45,68,90][Math.min(b,2)]+boss;}
function td(o,sp,s,l){o=o||0;sp=sp||1;l=l||55;const m=tdMult(),sat=s!==undefined?s:tdSat();return'hsl('+((Date.now()*.07*sp*m+o)%360)+','+sat+'%,'+l+'%)';}
function tda(o,sp,a,s,l){o=o||0;sp=sp||1;a=a||.7;l=l||55;const m=tdMult(),sat=s!==undefined?s:tdSat();return'hsla('+((Date.now()*.07*sp*m+o)%360)+','+sat+'%,'+l+'%,'+a+')';}
function tdg(x1,y1,x2,y2,o,sp){o=o||0;sp=sp||1;const g=ctx.createLinearGradient(x1,y1,x2,y2),m=tdMult(),t=Date.now()*.07*sp*m+o,sat=tdSat();g.addColorStop(0,'hsl('+(t%360)+','+sat+'%,55%)');g.addColorStop(.5,'hsl('+((t+180)%360)+','+Math.min(sat+10,100)+'%,60%)');g.addColorStop(1,'hsl('+((t+300)%360)+','+sat+'%,55%)');return g;}

// Resize
function updateCSSIntensity(){const s=['8s','5s','3s'][Math.min(cLv||0,2)];const w=document.getElementById('wrap');if(w)w.style.animationDuration=s;const b=document.getElementById('bar');if(b)b.style.animationDuration=s;}

function resize(){
  if(mini)return;
  // Use actual window dimensions — works on iPhone, iPad, desktop, iframe
  const WW=window.innerWidth||document.documentElement.clientWidth||320;
  const WH=window.innerHeight||document.documentElement.clientHeight||600;
  const gameW=Math.min(WW,430);

  // Set wrap to fill screen
  const wrapEl=document.getElementById('wrap');
  if(wrapEl){
    wrapEl.style.width=gameW+'px';
    wrapEl.style.height=WH+'px';
    wrapEl.style.maxWidth=gameW+'px';
  }

  // Bar height is fixed at 40px, ctrl height is fixed ~120px
  const barH=40;
  const ctrlEl=document.getElementById('ctrl');
  const ctrlH=ctrlEl?(ctrlEl.offsetHeight>0?ctrlEl.offsetHeight:130):130;
  const availH=WH-barH-ctrlH;

  // Canvas fills available height, constrained by width
  const scaleByW=gameW/GW;
  const scaleByH=availH/GH;
  const s=Math.min(scaleByW,scaleByH);
  const cw2=Math.floor(GW*s);
  const ch=Math.floor(GH*s);

  cv.width=GW;cv.height=GH;
  cv.style.width=cw2+'px';cv.style.height=ch+'px';

  const cvwrap=document.getElementById('cvwrap');
  if(cvwrap){cvwrap.style.height=ch+'px';}

  scale=s;
}
window.addEventListener('resize',function(){setTimeout(resize,80);});
// Fire resize multiple times to handle iOS Safari toolbar show/hide
setTimeout(resize,0);
setTimeout(resize,100);
setTimeout(resize,500);

// minimize removed

// Audio
var AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,d,t,v,dl){t=t||'square';v=v||.1;dl=dl||0;try{var a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime+dl);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dl+d);o.start(a.currentTime+dl);o.stop(a.currentTime+dl+d);}catch(e){}}
var SFX={
  jump:function(){tone(280,.05);tone(460,.08,'square',.1,.04);},
  trick:function(){[500,650,800,950].forEach(function(f,i){tone(f,.06,'square',.1,i*.04);});},
  gtrick:function(){[600,800,1000,1200].forEach(function(f,i){tone(f,.08,'sine',.14,i*.05);});},
  atk:function(){tone(700,.04);tone(200,.07,'square',.1,.03);},
  hit:function(){tone(90,.18,'sawtooth',.18);},
  eDie:function(){[350,500,700].forEach(function(f,i){tone(f,.07,'square',.1,i*.06);});},
  bHit:function(){tone(75,.22,'sawtooth',.22);},
  bDie:function(){[250,400,600,800,1000].forEach(function(f,i){tone(f,.12,'square',.12,i*.09);});},
  bLost:function(){[400,300,200,100].forEach(function(f,i){tone(f,.15,'sawtooth',.2,i*.1);});},
  bGain:function(){[300,500,700,900].forEach(function(f,i){tone(f,.1,'sine',.14,i*.08);});},
  wiz:function(){[500,700,900,700,1000].forEach(function(f,i){tone(f,.1,'sine',.12,i*.07);});},
  grind:function(){tone(160,.3,'sawtooth',.06);},
  go:function(){[400,300,200,150].forEach(function(f,i){tone(f,.15,'sawtooth',.2,i*.12);});},
  lup:function(){[400,600,800,1000].forEach(function(f,i){tone(f,.1,'square',.1,i*.09);});}
};
var mPlay=false,mIdx=0;
var MN=[[262,330,392,330,262,294],[294,370,440,370,330,392],[330,415,494,415,370,440]];
function startM(lv){stopM();mPlay=true;mIdx=0;var n=MN[lv]||MN[0];(function lp(){if(!mPlay)return;try{var a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=n[mIdx%n.length];g.gain.setValueAtTime(.03,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.16);o.start(a.currentTime);o.stop(a.currentTime+.18);mIdx++;setTimeout(lp,200);}catch(e){}})();}
function stopM(){mPlay=false;}

// Input
var keys={};
var touch={L:false,R:false,jp:false,tp:false};
window.addEventListener('keydown',function(e){
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!keys._jh){keys._jp=true;keys._jh=true;}
  if(e.code==='KeyX'||e.code==='KeyZ')keys._ap=true;
  if(e.code==='KeyP')keys._pp=true;
  if(e.code==='Enter')keys._ep=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0)e.preventDefault();
});
window.addEventListener('keyup',function(e){keys[e.code]=false;if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')keys._jh=false;});
function clrK(){keys._jp=false;keys._ap=false;keys._tp=false;keys._pp=false;keys._ep=false;touch.jp=false;touch.tp=false;}

// REAL HTML BUTTONS
var isMob=('ontouchstart' in window)||navigator.maxTouchPoints>0;
function wireBtn(id,onDn,onUp){
  var el=document.getElementById(id);if(!el)return;
  function dn(e){e.preventDefault();e.stopPropagation();el.classList.add('on');onDn();getAC();}
  function up(e){e.preventDefault();e.stopPropagation();el.classList.remove('on');if(onUp)onUp();}
  el.addEventListener('touchstart',dn,{passive:false});el.addEventListener('touchend',up,{passive:false});el.addEventListener('touchcancel',up,{passive:false});
  el.addEventListener('mousedown',dn);el.addEventListener('mouseup',up);el.addEventListener('mouseleave',up);
}
wireBtn('bL',function(){touch.L=true;},function(){touch.L=false;});
wireBtn('bR',function(){touch.R=true;},function(){touch.R=false;});
wireBtn('bJ',function(){keys._jp=true;},function(){});
wireBtn('bA',function(){keys._ap=true;},function(){});

cv.addEventListener('touchend',function(e){e.preventDefault();if(gState===ST.T||gState===ST.GO||gState===ST.W){keys._ep=true;getAC();}},{passive:false});
cv.addEventListener('click',function(){if(gState===ST.T||gState===ST.GO||gState===ST.W){keys._ep=true;getAC();}});

var pbtn=document.getElementById('pbtn');
function doPause(){getAC();if(gState===ST.P||gState===ST.B){pCur=0;gState=ST.PA;pbtn.textContent='PLAY';}else if(gState===ST.PA){gState=ST.P;pbtn.textContent='PAUSE';}}
pbtn.addEventListener('click',doPause);pbtn.addEventListener('touchend',function(e){e.preventDefault();doPause();},{passive:false});

cv.addEventListener('touchstart',function(e){
  if(gState!==ST.PA)return;e.preventDefault();
  var r=cv.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(function(t){
    var x=(t.clientX-r.left)*(GW/r.width),y=(t.clientY-r.top)*(GH/r.height);
    pMB.forEach(function(b,i){if(b.x&&x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){pCur=i;setTimeout(doSel,80);}});
  });
},{passive:false});

function updateHUD(){
  var sv=document.getElementById('score-val');if(sv)sv.textContent=gScore;
  var lv=document.getElementById('lives-val');if(lv&&player)lv.textContent='\u2665'.repeat(Math.max(0,player.lives));
}

// Tutorial
var TUT_KEY='trTutV5';
var tutIdx=0,tutFromPause=false;
// Tutorial pages — story first, then controls, then powerups
var TUT_PAGES=[
  {type:'story'},
  {type:'controls'},
  {type:'powerups'}
];
function showTut(fp){tutIdx=0;tutFromPause=!!fp;renderTut();document.getElementById('tut').style.display='flex';}
function closeTut(){document.getElementById('tut').style.display='none';localStorage.setItem(TUT_KEY,'1');getAC();tutFromPause=false;}

function renderTut(){
  var p=TUT_PAGES[tutIdx];
  if(!p){closeTut();return;}
  var title=document.getElementById('tut-title');
  var body=document.getElementById('tut-body');
  body.innerHTML='';

  if(p.type==='story'){
    title.textContent='THREAD RIPPER';
    // Story card
    var card=document.createElement('div');
    card.style.cssText='background:#0a0a14;border:2px solid rgba(255,100,50,.4);border-radius:10px;padding:16px;';
    card.innerHTML=[
      '<div style="font-size:5px;color:#aaa;line-height:2.2;letter-spacing:.3px;">',
      'Deep in Sneaker City, a pair of animated shoelaces named',
      ' <span style="color:#FFD700">LACE</span> lived to skate.',
      ' One day the evil <span style="color:#CC44CC">Velcro Viktor</span> — a half-velcro,',
      ' half-demon bootleg sneaker — ripped Lace\'s board clean off their feet.',
      '</div>',
      '<div style="font-size:5px;color:#aaa;line-height:2.2;margin-top:10px;letter-spacing:.3px;">',
      'Lace must fight through three wild worlds —',
      ' <span style="color:#ff8c00">The Sneaker Factory</span>,',
      ' <span style="color:#00ff80">The Skate Park</span>, and the',
      ' <span style="color:#4488ff">Hall of Fame</span> —',
      ' defeating bosses to reclaim the board.',
      ' An ancient Wizard waits at the end with a secret weapon:',
      ' <span style="color:gold">the legendary Glow Board</span>.',
      '</div>',
      '<div style="font-size:5px;color:#888;line-height:2;margin-top:10px;font-style:italic">',
      'Thread your story. Lace up. Let\'s ride.',
      '</div>'
    ].join('');
    body.appendChild(card);
  }

  else if(p.type==='controls'){
    title.textContent=isMob?'CONTROLS':'CONTROLS';
    if(isMob){
      // Mobile: show button icons with labels
      var rows=[
        {bg:'#1a3a5c',bc:'hsl(210,90%,50%)',icon:'◄►',label:'LEFT / RIGHT',desc:'Hold to skate in that direction'},
        {bg:'#4a3800',bc:'hsl(45,100%,55%)',icon:'⬆⬆',label:'JUMP (tap twice)',desc:'Second jump = double jump + trick!'},
        {bg:'#4a1a1a',bc:'hsl(0,90%,55%)',icon:'⚔',label:'ATK',desc:'Whip your lace — hits enemies & bosses'},
      ];
      rows.forEach(function(r){
        var row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:10px;padding:11px 14px;margin-bottom:8px;';
        var btn=document.createElement('div');
        btn.style.cssText='width:48px;height:48px;border-radius:50%;background:'+r.bg+';border:3px solid '+r.bc+';display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;';
        btn.textContent=r.icon;
        var txt=document.createElement('div');
        txt.innerHTML='<div style="font-size:7px;color:#fff;margin-bottom:5px;">'+r.label+'</div><div style="font-size:5px;color:#888;line-height:1.7;">'+r.desc+'</div>';
        row.appendChild(btn);row.appendChild(txt);body.appendChild(row);
      });
    } else {
      // Desktop keyboard layout
      var keys2=[
        {keys:['← →','A  D'],col:'#1a3a5c',bc:'hsl(210,90%,50%)',desc:'Move left / right'},
        {keys:['SPACE','↑'],col:'#4a3800',bc:'hsl(45,100%,55%)',desc:'Jump → tap twice = double jump + trick!'},
        {keys:['Z','X'],col:'#4a1a1a',bc:'hsl(0,90%,55%)',desc:'Attack — whip your lace'},
        {keys:['P'],col:'#222',bc:'#555',desc:'Pause the game'},
      ];
      keys2.forEach(function(r){
        var row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:10px;padding:11px 14px;margin-bottom:8px;';
        var kbox=document.createElement('div');
        kbox.style.cssText='display:flex;gap:4px;flex-shrink:0;';
        r.keys.forEach(function(k){
          var kb=document.createElement('div');
          kb.style.cssText='background:'+r.col+';border:2px solid '+r.bc+';border-radius:6px;padding:4px 7px;font-size:6px;color:#fff;white-space:nowrap;';
          kb.textContent=k;kbox.appendChild(kb);
        });
        var txt=document.createElement('div');
        txt.style.cssText='font-size:5px;color:#888;line-height:1.7;';
        txt.textContent=r.desc;
        row.appendChild(kbox);row.appendChild(txt);body.appendChild(row);
      });
    }
    // Double jump tip
    var tip=document.createElement('div');
    tip.style.cssText='background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:10px 12px;font-size:5px;color:#FFD700;line-height:1.8;margin-top:4px;';
    tip.innerHTML='⬆⬆ <b>PRO TIP:</b> Double jumping mid-air auto-triggers a trick and earns bonus points!';
    body.appendChild(tip);
  }

  else if(p.type==='powerups'){

Player.prototype.upd=function(dt,plats){
  if(this.ht>0)this.ht-=dt;if(this.ac>0)this.ac-=dt;if(this.shieldT>0)this.shieldT-=dt;if(this.bigAtk>0)this.bigAtk-=dt;

  if(this.wt>0)this.wt-=dt;if(this.st>0)this.st-=dt;if(this.tT>0)this.tT-=dt;if(this.tCool>0)this.tCool-=dt;
  var sp=this.wt>0?PS*2.2:this.st>0?PS*.5:PS;
  if(keys.ArrowLeft||keys.KeyA||touch.L){this.vx=-sp;this.fr=false;}
  else if(keys.ArrowRight||keys.KeyD||touch.R){this.vx=sp;this.fr=true;}
  else this.vx*=.82;
  if(keys._jp){
    if(this.og){
      // First jump — leave ground
      this.vy=JF;this.og=false;
      this.jl=this.dj?1:0; // 1 = one more jump left
      SFX.jump();
    } else if(this.dj&&this.jl>0){
      // DOUBLE JUMP — Smash style: jump + auto trick!
      this.vy=JF*.85;this.jl=0;
      SFX.jump();
      // Auto-trigger trick on double jump
      if(this.hB&&this.tCool<=0)this.doTrick();
    }
  }
  if(keys._ap&&this.ac<=0){this.ac=.5;this.at=.18;SFX.atk();}
  this.vy+=GR;this.x+=this.vx;this.y+=this.vy;
  this.og=false;this.onR=false;
  var self=this;

  if(this.y>GH+50){this.y=GH-80;this.vy=0;this.dmg(1);}

};

// Projectile
function Proj(t,x,y,vx,vy){this.t=t;this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.alive=true;this.tm=0;

Proj.prototype.upd=function(dt,pl){this.tm+=dt;if(this.tm>this.lf){this.alive=false;return;}if(this.t==='st'&&this.ld){if(rov(this,pl))pl.st=2;return;}if(this.t==='to'&&this.tm>.8){this.vx*=-1;if(this.tm>1.6)this.alive=false;}this.x+=this.vx;this.y+=this.vy;if(this.t!=='sw')this.vy+=.12;if(this.t==='st'&&this.y>=GH-38){this.y=GH-38;this.ld=true;this.vx=0;this.vy=0;}if(this.t==='sw')this.y=GH-38;if(rov(this,pl)&&this.t!=='st'){pl.dmg(1);this.alive=false;}else if(rov(this,pl)&&this.t==='st')pl.st=2;};

    SFX.bGain();
    this.alive=false;
  }
};
Pickup.prototype.drw=function(){
  var by=Math.sin(this.b)*3;
  var col=PU_COLS[this.t]||'#88FF88';
  var icon=PU_ICONS[this.t]||'?';
  // Glow ring
  ctx.globalAlpha=0.25+Math.sin(this.age*4)*0.1;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(this.x+9,this.y+9+by,14,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Main box
  ctx.fillStyle=col;
  ctx.fillRect(this.x,this.y+by,18,18);
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillRect(this.x,this.y+by,18,4);
  // Icon
  ctx.fillStyle='#fff';
  ctx.font='10px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText(icon,this.x+9,this.y+by+13);
  ctx.textAlign='left';
};

// Wizard
function Wizard(x){this.x=x;this.y=GH-30-48;this.w=24;this.h=40;this.talked=false;this.fT=0;}
Wizard.prototype.upd=function(dt,pl){this.fT+=dt;if(!this.talked&&rov({x:this.x-30,y:this.y-10,w:this.w+60,h:this.h+20},pl)){this.talked=true;wDlg=true;wDlgT=5;SFX.wiz();pl.gB=true;pl.hB=true;spP(this.x+12,this.y+20,td(0,2),16,3);spTx(this.x+12,this.y-15,'GLOW BOARD!');}};
Wizard.prototype.drw=function(){var x=this.x,y=this.y+Math.sin(this.fT*2)*3;ctx.fillStyle=td(200,.5,70,40);ctx.fillRect(x+2,y+14,20,26);ctx.fillStyle=td(60,2,100,70);ctx.fillRect(x+6,y+18,4,4);ctx.fillRect(x+14,y+22,3,3);ctx.fillStyle='#FDBCB4';ctx.fillRect(x+5,y+6,14,12);ctx.fillStyle=td(260,.5,80,35);ctx.beginPath();ctx.moveTo(x+12,y-8);ctx.lineTo(x+3,y+8);ctx.lineTo(x+21,y+8);ctx.closePath();ctx.fill();ctx.fillStyle=td(300,1,90,55);ctx.fillRect(x+2,y+6,20,4);ctx.fillStyle='#FFF';ctx.fillRect(x+7,y+8,4,4);ctx.fillRect(x+13,y+8,4,4);ctx.fillStyle=td(180,3,100,60);ctx.fillRect(x+8,y+9,2,2);ctx.fillRect(x+14,y+9,2,2);ctx.fillStyle='#8B6914';ctx.fillRect(x+22,y+10,3,34);ctx.fillStyle=td(0,3,100,70);ctx.beginPath();ctx.arc(x+23,y+8,5,0,Math.PI*2);ctx.fill();if(!this.talked){ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(x-35,y-28,90,18);ctx.fillStyle='#FFF';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('APPROACH!',x+12,y-18);ctx.textAlign='left';}};

// Camera
function Camera(){this.x=0;}
Camera.prototype.upd=function(pl,w){var t=pl.x-GW/3;this.x+=(t-this.x)*.1;this.x=Math.max(0,Math.min(w-GW,this.x));};
Camera.prototype.on=function(){ctx.translate(-this.x,0);};
Camera.prototype.off=function(){ctx.translate(this.x,0);};

// HUD
function drwHUD(pl){
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(8,8,60,10);
  for(var i=0;i<pl.hp;i++){ctx.fillStyle=td(i*30,1);ctx.fillRect(8+i*11,8,10,10);}
  ctx.strokeStyle=td(180,.5);ctx.lineWidth=1;ctx.strokeRect(8,8,60,10);
  ctx.fillStyle='#aaa';ctx.font='5px "Press Start 2P"';ctx.fillText('HP',70,17);
  ctx.textAlign='center';
  if(!pl.hB){ctx.fillStyle='#F44';ctx.font='5px "Press Start 2P"';ctx.fillText('NO BOARD!',GW/2,24);}
  else if(pl.gB){ctx.fillStyle=td(0,3,100,65);ctx.font='5px "Press Start 2P"';ctx.fillText('★ GLOW BOARD',GW/2,24);}
  // Active powerup indicators (right side of HUD)
  var px2=GW-8;var py2=8;
  if(pl.shieldT>0){ctx.fillStyle='#FFD700';ctx.font='5px "Press Start 2P"';ctx.textAlign='right';ctx.fillText('★SHIELD '+Math.ceil(pl.shieldT)+'s',px2,py2+8);}
  else if(pl.bigAtk>0){ctx.fillStyle='#FF8800';ctx.font='5px "Press Start 2P"';ctx.textAlign='right';ctx.fillText('⚔POWER '+Math.ceil(pl.bigAtk)+'s',px2,py2+8);}
  else if(pl.wt>0){ctx.fillStyle='#44CC44';ctx.font='5px "Press Start 2P"';ctx.textAlign='right';ctx.fillText('⚡SPEED '+Math.ceil(pl.wt)+'s',px2,py2+8);}
  if(!pl.og&&pl.hB&&pl.jl>0){ctx.fillStyle=tda(200,2,.55);ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('2x JUMP = TRICK!',GW/2,GH-38);}
  ctx.textAlign='left';
  updateHUD();
}
function drwScan(){ctx.fillStyle='rgba(0,0,0,.06)';for(var sy=0;sy<GH;sy+=3)ctx.fillRect(0,sy,GW,1);}

// Screens
function drwTitle(t){
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);drwScan();
  ctx.fillStyle='rgba(255,255,255,.05)';for(var i=0;i<28;i++)ctx.fillRect((i*73+Math.floor(t*.5))%GW,(i*41)%GH,1+(i%3),1);
  bgC.forEach(function(c){drwCrit(c);});
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(GW/2-108,GH/2-70,216,130);ctx.strokeStyle=td(0,1.5);ctx.lineWidth=2;ctx.strokeRect(GW/2-108,GH/2-70,216,130);
  var sh=Math.sin(t*2)*.3+.7;ctx.globalAlpha=sh;
  ctx.fillStyle=tdg(GW/2-55,GH/2-42,GW/2+55,GH/2-42,0,1.5);ctx.font='18px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('THREAD',GW/2,GH/2-38);
  ctx.fillStyle=tdg(GW/2-50,GH/2-16,GW/2+50,GH/2-16,180,1.5);ctx.fillText('RIPPER',GW/2,GH/2-12);
  ctx.globalAlpha=1;
  ctx.fillStyle=td(90,.7,70,70);ctx.font='5px "Press Start 2P"';ctx.fillText("A Lace's Skate Quest",GW/2,GH/2+12);
  ctx.fillStyle=td(240,.8,80,65);ctx.fillText('Thread Your Story',GW/2,GH/2+26);
  ctx.fillStyle=td(300,.6,60,70);ctx.font='4px "Press Start 2P"';ctx.fillText('by Spiffy Brand',GW/2,GH/2+40);
  if(Math.floor(t*2)%2===0){ctx.fillStyle=td(120,2);ctx.font='7px "Press Start 2P"';ctx.fillText('TAP TO START',GW/2,GH/2+62);}
  ctx.fillStyle=tda(60,.5,.4);ctx.font='4px "Press Start 2P"';ctx.fillText('spiffybrand.com',GW/2,GH-18);
  ctx.textAlign='left';
}
function drwLvl(li){
  var th=LV[li];ctx.fillStyle=th.sky||th.bg;ctx.fillRect(0,0,GW,GH);bgC.forEach(function(c){drwCrit(c);});
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(GW/2-110,GH/2-55,220,110);ctx.strokeStyle=td(0,1.5);ctx.lineWidth=2;ctx.strokeRect(GW/2-110,GH/2-55,220,110);
  ctx.fillStyle=tdg(GW/2-55,GH/2-28,GW/2+55,GH/2-28,0,1);ctx.font='8px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('LEVEL '+(li+1),GW/2,GH/2-22);
  ctx.fillStyle=th.acc||'#fff';ctx.font='6px "Press Start 2P"';ctx.fillText(th.name,GW/2,GH/2-4);
  if(li===1){ctx.fillStyle='#4CAF50';ctx.font='5px "Press Start 2P"';ctx.fillText('DOUBLE JUMP UNLOCKED!',GW/2,GH/2+14);}
  if(li===2){ctx.fillStyle=td(0,2);ctx.font='5px "Press Start 2P"';ctx.fillText('FIND THE WIZARD!',GW/2,GH/2+14);}
  ctx.textAlign='left';
}
function drwGO(){
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle=tdg(GW/2-70,GH/2-40,GW/2+70,GH/2-40,0,2);ctx.font='13px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('GAME OVER',GW/2,GH/2-34);
  ctx.fillStyle='#FFF';ctx.font='6px "Press Start 2P"';ctx.fillText('SCORE: '+gScore,GW/2,GH/2-8);ctx.fillText('BEST: '+hiSc,GW/2,GH/2+8);
  if(Math.floor(Date.now()/500)%2===0){ctx.fillStyle=td(180,2);ctx.fillText('TAP TO RETRY',GW/2,GH/2+34);}ctx.textAlign='left';
}
function drwWin(wt){
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);spCnf(2);drwP();
  var sh=Math.sin(wt*3)*.4+.6;ctx.globalAlpha=sh;
  ctx.fillStyle=tdg(GW/2-70,GH/2-40,GW/2+70,GH/2-40,0,1.5);ctx.font='9px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('LACE IS',GW/2,GH/2-38);
  ctx.fillStyle=tdg(GW/2-65,GH/2-20,GW/2+65,GH/2-20,180,1.5);ctx.fillText('LEGENDARY!',GW/2,GH/2-18);
  ctx.globalAlpha=1;ctx.fillStyle='#FFF';ctx.font='6px "Press Start 2P"';ctx.fillText('SCORE: '+gScore,GW/2,GH/2+6);
  ctx.fillStyle='#aaa';ctx.font='4px "Press Start 2P"';ctx.fillText('(c) Spiffy Brand',GW/2,GH/2+24);
  if(Math.floor(wt*2)%2===0){ctx.fillStyle=td(0,2);ctx.font='6px "Press Start 2P"';ctx.fillText('TAP TO PLAY AGAIN',GW/2,GH/2+46);}ctx.textAlign='left';
}
function drwPause(){
  ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,GW,GH);
  var pw=Math.min(260,GW-20),ph=200,px=(GW-pw)/2,py=(GH-ph)/2;
  ctx.fillStyle='#111';ctx.fillRect(px,py,pw,ph);ctx.strokeStyle=td(0,1.5);ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);ctx.strokeStyle=td(120,1);ctx.lineWidth=1;ctx.strokeRect(px+3,py+3,pw-6,ph-6);
  ctx.fillStyle=tdg(GW/2-45,py+20,GW/2+45,py+20,0,2);ctx.font='9px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('PAUSED',GW/2,py+20);
  ctx.strokeStyle=td(180,1);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+10,py+28);ctx.lineTo(px+pw-10,py+28);ctx.stroke();
  PMENU.forEach(function(item,i){
    var iy=py+52+i*34,sel=i===pCur;
    if(sel){ctx.fillStyle=tda(i*80,1.5,.6);ctx.fillRect(px+8,iy-14,pw-16,20);}
    ctx.fillStyle=sel?'#fff':'#aaa';ctx.font='6px "Press Start 2P"';ctx.textAlign='center';ctx.fillText(item,GW/2,iy);
    if(sel){ctx.fillStyle=td(60,2);ctx.beginPath();ctx.moveTo(px+16,iy-4);ctx.lineTo(px+22,iy-8);ctx.lineTo(px+22,iy+1);ctx.closePath();ctx.fill();}
    pMB[i]={x:px+8,y:iy-15,w:pw-16,h:22};
  });
  ctx.fillStyle='rgba(80,80,80,.7)';ctx.font='4px "Press Start 2P"';ctx.fillText('TAP TO SELECT',GW/2,py+ph-8);ctx.textAlign='left';
}
function drwWDlg(){if(!wDlg)return;ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(8,GH-62,GW-16,50);ctx.strokeStyle=td(0,2);ctx.lineWidth=2;ctx.strokeRect(8,GH-62,GW-16,50);ctx.fillStyle='#FFF';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('WIZARD: "TAKE THE GLOW BOARD!',GW/2,GH-46);ctx.fillText('ANCIENT SKATE MAGIC AWAITS!"',GW/2,GH-32);ctx.fillStyle=td(60,2);ctx.fillText('[GLOW BOARD OBTAINED!]',GW/2,GH-18);ctx.textAlign='left';}
function drwNBD(){if(!noBrd)return;ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(8,GH-54,GW-16,42);ctx.strokeStyle='#F44';ctx.lineWidth=2;ctx.strokeRect(8,GH-54,GW-16,42);ctx.fillStyle='#F44';ctx.font='4px "Press Start 2P"';ctx.textAlign='center';ctx.fillText('VIKTOR STOLE YOUR BOARD!',GW/2,GH-38);ctx.fillText('FIND THE WIZARD!',GW/2,GH-24);ctx.textAlign='left';}

function doSel(){
  if(pCur===0){gState=ST.P;pbtn.textContent='PAUSE';}
  else if(pCur===1){gState=ST.P;showTut(true);}
  else if(pCur===2){restart();}
  else{stopM();gState=ST.T;ttT=0;parts=[];bgC=[];pbtn.textContent='PAUSE';}
  pCur=0;
}

function initLv(i){
  cLv=i;lData=mkLv(i);
  enemies=lData.en.map(function(e){return new Enemy(e.t,e.x,e.y);});
  pickups=(lData.pk||[]).map(function(p){return new Pickup(p.t,p.x,p.y);});
  boss=null;wizard=null;bSpawn=false;bDone=false;wSpawn=false;wDlg=false;noBrd=false;puTimer=10;
  cam=new Camera();player.x=40;player.y=GH-80;player.vx=0;player.vy=0;
  if(i===2&&!player.gB)player.hB=false;
  startM(i);updateCSSIntensity();setTimeout(resize,100);
}

function restart(){
  player=new Player();gScore=0;parts=[];bgC=[];
  initLv(0);gState=ST.LT;trT=2;pbtn.textContent='PAUSE';
  if(!localStorage.getItem(TUT_KEY))showTut();
}

function gLoop(ts){
  var dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  requestAnimationFrame(gLoop);
  ctx.fillStyle='#000';ctx.fillRect(0,0,GW,GH);

  if(gState===ST.T){
    ttT+=dt;if(Math.random()<dt*.5)spCrit();updCrit(dt);drwTitle(ttT);
    if(keys._ep||keys._jp){restart();getAC();}
  }
  else if(gState===ST.LT){
    trT-=dt;updCrit(dt);drwLvl(cLv);if(trT<=0)gState=ST.P;
  }
  else if(gState===ST.P||gState===ST.B){
    if(!bSpawn&&player.x+cam.x>lData.bX-200){
      boss=new Boss(['kn','vk','ul'][cLv],lData.bX);bSpawn=true;gState=ST.B;sfAmt=.8;
    }
    if(cLv===2&&bDone&&!wSpawn){wSpawn=true;wizard=new Wizard(player.x+200);}
    player.upd(dt,lData.plat);cam.upd(player,lData.w);
    enemies.forEach(function(e){e.upd(dt,player,lData.plat);if(e.sk){e.sk.forEach(function(k){enemies.push(k);});e.sk=null;}});
    enemies=enemies.filter(function(e){return e.alive;});
    pickups.forEach(function(p){p.upd(dt,player);});pickups=pickups.filter(function(p){return p.alive;});
    if(wizard)wizard.upd(dt,player);
    updP();if(Math.random()<dt*.3)spCrit();updCrit(dt);gScore+=Math.floor(dt*8);
    // Random powerup drops every ~12-18s
    puTimer-=dt;if(puTimer<=0){puTimer=12+Math.random()*8;var puTypes=['h','h','sp','sh','bi','w'];var pt=puTypes[Math.floor(Math.random()*puTypes.length)];var px3=player.x+40+Math.random()*120;pickups.push(new Pickup(pt,Math.min(px3,lData.w-30),GH-80));}
    if(boss){boss.upd(dt,player);if(!boss.alive&&!bDone){bDone=true;gScore+=500*(cLv+1);SFX.lup();
      if(cLv===1){setTimeout(function(){player.hB=false;noBrd=true;noBrdT=6;SFX.bLost();sfAmt=.5;},1200);setTimeout(function(){cLv=2;initLv(2);gState=ST.LT;trT=2.5;},4000);}
      else if(cLv===0){setTimeout(function(){cLv=1;initLv(1);gState=ST.LT;trT=2.5;},2500);}
      else{setTimeout(function(){gState=ST.W;wtT=0;stopM();},3000);}}}
    if(noBrd){noBrdT-=dt;if(noBrdT<=0)noBrd=false;}
    if(wDlg){wDlgT-=dt;if(wDlgT<=0)wDlg=false;}
    if(!bSpawn&&player.x>lData.eX){if(cLv<2){cLv++;initLv(cLv);gState=ST.LT;trT=2;}else{gState=ST.W;wtT=0;}}
    if(player.lives<=0){stopM();SFX.go();if(gScore>hiSc){hiSc=gScore;localStorage.setItem('trhi',''+hiSc);}gState=ST.GO;}
    drwBg(cLv,cam.x);ctx.save();cam.on();drwPlat(lData.plat);pickups.forEach(function(p){p.drw();});enemies.forEach(function(e){e.drw();});if(wizard)wizard.drw();if(boss)boss.drw();player.drw();drwP();cam.off();ctx.restore();
    drwHUD(player);drwWDlg();drwNBD();drwScan();
    if(keys._pp){pCur=0;gState=ST.PA;pbtn.textContent='PLAY';}
  }
  else if(gState===ST.PA){
    drwBg(cLv,cam.x);drwPause();drwScan();
    if(pSCool>0)pSCool-=dt;
    if((keys.ArrowUp||keys.KeyW)&&pSCool<=0){pCur=(pCur+PMENU.length-1)%PMENU.length;pSCool=.18;}
    if((keys.ArrowDown||keys.KeyS)&&pSCool<=0){pCur=(pCur+1)%PMENU.length;pSCool=.18;}
    if(keys._pp){pCur=0;gState=ST.P;pbtn.textContent='PAUSE';}
    if(keys._ep||keys._jp)doSel();
  }
  else if(gState===ST.GO){drwGO();drwScan();if(keys._ep||keys._jp)restart();}
  else if(gState===ST.W){wtT+=dt;drwWin(wtT);drwScan();if(keys._ep||keys._jp)restart();}

  if(sfAmt>0){ctx.fillStyle='rgba(255,255,255,'+sfAmt+')';ctx.fillRect(0,0,GW,GH);sfAmt=Math.max(0,sfAmt-.04);}
  clrK();
}
requestAnimationFrame(function(t){lastT=t;requestAnimationFrame(gLoop);});
</script>
